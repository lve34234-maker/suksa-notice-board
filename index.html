<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🥋 시범단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#0095f6;--red:#ed4956;--black:#262626;--gray:#8e8e8e;
  --border:#dbdbdb;--bg:#fafafa;--card:#fff;--gold:#D4AF37;
  --green:#2e7d32;--tag-blue:#1565C0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--black);min-height:100vh;overflow-x:hidden;}
button,input,textarea,select{font-family:'Noto Sans KR',sans-serif;}

/* ── 로딩 ── */
.full-loader{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.full-loader .logo{font-size:2.2rem;font-weight:700;letter-spacing:-1px;}
.full-loader .logo span{color:var(--red);}
.spin{width:32px;height:32px;border:3px solid #eee;border-top:3px solid var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── 로그인 페이지 ── */
#page-login{display:none;min-height:100vh;background:#fff;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#page-login.show{display:flex;}
.login-logo{font-size:2rem;font-weight:700;margin-bottom:8px;letter-spacing:-1px;}
.login-logo span{color:var(--red);}
.login-sub{font-size:.8rem;color:var(--gray);margin-bottom:28px;text-align:center;}
.login-box{width:100%;max-width:360px;}
.login-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:.9rem;outline:none;margin-bottom:10px;background:#fafafa;transition:border .2s;}
.login-input:focus{border-color:#aaa;background:#fff;}
.btn-login{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:12px;font-size:.92rem;font-weight:600;cursor:pointer;margin-bottom:10px;transition:opacity .2s;}
.btn-login:hover{opacity:.88;}
.btn-login:disabled{opacity:.5;cursor:default;}
.login-divider{display:flex;align-items:center;gap:12px;margin:14px 0;color:var(--gray);font-size:.78rem;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.btn-guest{width:100%;background:none;border:1.5px solid var(--border);border-radius:8px;padding:11px;font-size:.88rem;font-weight:600;color:var(--black);cursor:pointer;transition:background .2s;}
.btn-guest:hover{background:#f5f5f5;}
.login-err{color:var(--red);font-size:.78rem;text-align:center;margin-bottom:8px;min-height:18px;}

/* ── 앱 레이아웃 ── */
#page-app{display:none;}
#page-app.show{display:block;}
.app-header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0;}
.app-header-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;}
.app-logo{font-size:1.3rem;font-weight:700;letter-spacing:-.5px;cursor:pointer;}
.app-logo span{color:var(--red);}
.header-right{display:flex;align-items:center;gap:10px;}
.header-icon{background:none;border:none;font-size:1.25rem;cursor:pointer;padding:4px;border-radius:6px;transition:background .2s;position:relative;}
.header-icon:hover{background:#f5f5f5;}
.notif-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--red);border-radius:50%;display:none;}
.notif-dot.show{display:block;}

/* ── 콘텐츠 영역 ── */
.app-content{max-width:600px;margin:0 auto;padding-bottom:70px;}

/* ── 하단 네비 ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:100;}
.bnav-inner{max-width:600px;margin:0 auto;display:flex;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;background:none;border:none;cursor:pointer;font-size:.58rem;color:var(--gray);gap:3px;transition:color .2s;position:relative;}
.bnav-btn.active{color:var(--black);}
.bnav-btn .bnav-icon{font-size:1.3rem;line-height:1;}
.bnav-badge{position:absolute;top:8px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:.5rem;font-weight:700;width:14px;height:14px;border-radius:50%;display:none;align-items:center;justify-content:center;}
.bnav-badge.show{display:flex;}

/* ── 피드 ── */
.feed-stories{display:flex;gap:0;overflow-x:auto;padding:12px 16px 10px;border-bottom:1px solid var(--border);scrollbar-width:none;}
.feed-stories::-webkit-scrollbar{display:none;}
.story-item{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:66px;cursor:pointer;}
.story-ring{width:56px;height:56px;border-radius:50%;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);padding:2px;display:flex;align-items:center;justify-content:center;}
.story-ring.seen{background:linear-gradient(45deg,#ccc,#aaa);}
.story-avatar{width:50px;height:50px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:#fff;border:2px solid #fff;}
.story-name{font-size:.62rem;color:var(--black);text-align:center;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── 포스트 카드 ── */
.post-card{background:var(--card);border-bottom:1px solid var(--border);margin-bottom:0;}
.pc-header{display:flex;align-items:center;padding:10px 14px;gap:10px;}
.pc-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.88rem;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer;}
.pc-user-info{flex:1;cursor:pointer;}
.pc-username{font-size:.86rem;font-weight:600;color:var(--black);}
.pc-tag{font-size:.65rem;color:var(--gray);}
.pc-more{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--gray);padding:4px 8px;}
.pc-image{width:100%;aspect-ratio:1;object-fit:cover;display:block;cursor:pointer;}
.pc-image.landscape{aspect-ratio:4/3;}
.pc-text-only{padding:14px 16px;font-size:.9rem;line-height:1.7;color:var(--black);background:#f5f5f5;min-height:80px;cursor:pointer;}
.pc-actions{display:flex;align-items:center;padding:8px 12px 6px;gap:4px;}
.btn-heart{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:4px;transition:transform .15s;line-height:1;}
.btn-heart:active{transform:scale(1.25);}
.btn-cmt-icon{background:none;border:none;font-size:1.4rem;cursor:pointer;padding:4px;color:var(--black);line-height:1;}
.pc-emoji-row{display:flex;gap:4px;padding:0 12px 6px;flex-wrap:wrap;}
.re-btn{background:#f5f5f5;border:1.5px solid #ebebeb;border-radius:16px;padding:3px 8px;font-size:.72rem;cursor:pointer;display:flex;align-items:center;gap:2px;transition:all .15s;}
.re-btn:hover{background:#eee;}.re-btn.active{background:#fff3e0;border-color:var(--gold);}
.re-cnt{font-size:.68rem;color:#555;font-weight:600;}
.pc-likes{padding:0 16px 4px;font-size:.84rem;font-weight:600;color:var(--black);}
.pc-caption{padding:2px 16px 6px;font-size:.84rem;line-height:1.5;color:var(--black);}
.pc-caption strong{font-weight:600;cursor:pointer;}
.pc-caption strong:hover{opacity:.7;}
.pc-cmt-link{padding:2px 16px 8px;font-size:.8rem;color:var(--gray);cursor:pointer;}
.pc-cmt-link:hover{color:#555;}
.pc-date{padding:2px 16px 10px;font-size:.72rem;color:var(--gray);}
.pc-attendance{padding:6px 14px;background:#f0fff4;border-top:1px solid #e8f5e9;font-size:.78rem;}

/* ── 검색 ── */
.search-header{padding:12px 14px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:57px;z-index:50;}
.search-bar{display:flex;align-items:center;background:#efefef;border-radius:10px;padding:8px 14px;gap:8px;}
.search-bar input{flex:1;background:none;border:none;outline:none;font-size:.88rem;}
.search-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;}
.search-thumb{aspect-ratio:1;background:#eee;overflow:hidden;cursor:pointer;position:relative;}
.search-thumb img{width:100%;height:100%;object-fit:cover;}
.search-thumb .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:linear-gradient(135deg,#1a1a1a,#3a3a3a);}
.search-tags{display:flex;gap:7px;padding:12px 14px;flex-wrap:wrap;}
.s-tag{background:#f0f0f0;border-radius:20px;padding:6px 14px;font-size:.8rem;cursor:pointer;transition:background .15s;font-weight:500;}
.s-tag:hover,.s-tag.active{background:var(--black);color:#fff;}

/* ── 상세 ── */
.detail-header{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:57px;z-index:50;gap:12px;}
.detail-back{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:4px;}
.detail-title{font-size:.95rem;font-weight:600;}
.detail-cmt-list{padding:0 14px;}
.detail-cmt-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #fafafa;}
.detail-cmt-item:last-child{border-bottom:none;}
.dcmt-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0;}
.dcmt-body{flex:1;}
.dcmt-author{font-size:.82rem;font-weight:600;}
.dcmt-text{font-size:.82rem;color:var(--black);line-height:1.5;white-space:pre-wrap;}
.dcmt-date{font-size:.68rem;color:var(--gray);margin-top:2px;}
.dcmt-del{background:none;border:none;color:#ccc;font-size:.7rem;cursor:pointer;padding:2px 4px;}
.dcmt-del:hover{color:var(--red);}
.detail-cmt-write{position:sticky;bottom:70px;background:#fff;border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;}
.dcmt-av-mine{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;flex-shrink:0;}
.detail-cmt-input{flex:1;border:none;outline:none;font-size:.86rem;background:none;}
.detail-cmt-submit{background:none;border:none;color:var(--blue);font-size:.84rem;font-weight:600;cursor:pointer;padding:4px 8px;opacity:.5;}
.detail-cmt-submit.active{opacity:1;}
.att-sec{margin:0 14px 10px;background:#f8fff8;border:1px solid #c8e6c9;border-radius:10px;padding:12px;}
.att-sec-title{font-size:.82rem;font-weight:600;color:var(--green);margin-bottom:8px;}
.att-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.att-chip{padding:3px 9px;border-radius:14px;font-size:.7rem;font-weight:600;}
.att-chip.go{background:#e8f5e9;color:var(--green);border:1px solid #a5d6a7;}
.att-chip.no{background:#ffebee;color:var(--red);border:1px solid #ef9a9a;}
.att-write{display:flex;gap:6px;flex-wrap:wrap;}
.att-name-input{flex:1;min-width:80px;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:.8rem;outline:none;}
.btn-att{padding:7px 12px;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;color:#fff;}
.btn-att.go{background:var(--green);}
.btn-att.no{background:var(--red);}
.sch-badge{display:inline-flex;align-items:center;gap:5px;background:#EFF6FF;border:1px solid #90caf9;border-radius:6px;padding:4px 10px;font-size:.75rem;color:var(--tag-blue);font-weight:600;margin:0 14px 10px;}

/* ── 글쓰기 ── */
.write-top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:57px;z-index:50;}
.write-top-title{font-size:.95rem;font-weight:600;}
.btn-post{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:.84rem;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-post:hover{opacity:.85;}
.write-form{padding:14px;}
.write-img-wrap{background:#000;border-radius:10px;overflow:hidden;margin-bottom:12px;position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.write-img-placeholder{color:#fff;text-align:center;}
.write-img-placeholder .icon{font-size:2rem;margin-bottom:6px;}
.write-img-placeholder p{font-size:.78rem;color:#aaa;}
.write-img-preview{width:100%;height:100%;object-fit:contain;}
.write-caption{width:100%;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:.88rem;resize:none;min-height:90px;outline:none;margin-bottom:10px;line-height:1.6;}
.write-caption:focus{border-color:#aaa;}
.write-fields{display:flex;flex-direction:column;gap:8px;}
.write-field{display:flex;flex-direction:column;gap:4px;}
.write-field label{font-size:.74rem;font-weight:600;color:var(--gray);}
.write-input,.write-select{border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.86rem;outline:none;transition:border .2s;}
.write-input:focus,.write-select:focus{border-color:#aaa;}
.write-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.write-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* ── 프로필 ── */
.profile-top{background:#fff;border-bottom:1px solid var(--border);}
.profile-info{display:flex;align-items:center;gap:20px;padding:20px 16px 14px;}
.profile-big-av{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#fff;flex-shrink:0;}
.profile-details{flex:1;}
.profile-username{font-size:1.1rem;font-weight:600;margin-bottom:4px;}
.profile-display{font-size:.82rem;color:var(--gray);margin-bottom:8px;}
.profile-bio{font-size:.82rem;color:var(--black);line-height:1.5;}
.profile-stats{display:flex;gap:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.pstat{flex:1;text-align:center;padding:12px 0;}
.pstat-num{font-size:1rem;font-weight:700;color:var(--black);}
.pstat-lbl{font-size:.72rem;color:var(--gray);}
.profile-actions{padding:10px 14px;display:flex;gap:8px;}
.btn-edit-profile,.btn-logout{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px;font-size:.84rem;font-weight:600;cursor:pointer;background:none;transition:background .2s;}
.btn-edit-profile:hover,.btn-logout:hover{background:#f5f5f5;}
.btn-logout{color:var(--red);border-color:#ffcccc;}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;}
.profile-thumb{aspect-ratio:1;background:#eee;overflow:hidden;cursor:pointer;position:relative;}
.profile-thumb img{width:100%;height:100%;object-fit:cover;}
.profile-thumb .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:linear-gradient(135deg,#1a1a1a,#333);}
.profile-edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;justify-content:center;}
.profile-edit-modal.show{display:flex;}
.profile-edit-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:20px 20px 30px;}
.pem-title{font-size:1rem;font-weight:700;margin-bottom:16px;text-align:center;}
.pem-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.86rem;outline:none;margin-bottom:10px;}
.pem-input:focus{border-color:#aaa;}
.pem-btns{display:flex;gap:8px;margin-top:4px;}
.pem-save{flex:1;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px;font-size:.88rem;font-weight:600;cursor:pointer;}
.pem-cancel{background:#f0f0f0;color:#555;border:none;border-radius:8px;padding:11px 18px;font-size:.88rem;cursor:pointer;}

/* ── 공지 ── */
.notices-header{padding:14px;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:space-between;position:sticky;top:57px;z-index:50;}
.notices-header h2{font-size:.95rem;font-weight:700;}
.btn-write-small{background:none;border:1.5px solid var(--border);color:var(--black);padding:6px 14px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .2s;}
.btn-write-small:hover{background:#f5f5f5;}
.notice-item{background:#fff;border-bottom:1px solid var(--border);padding:14px;}
.ni-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.ni-title{font-size:.9rem;font-weight:700;}
.ni-date{font-size:.7rem;color:var(--gray);}
.ni-body{font-size:.83rem;color:var(--black);line-height:1.75;white-space:pre-wrap;}
.ni-del{background:none;border:none;color:var(--red);font-size:.72rem;cursor:pointer;padding:2px 6px;}
.notice-write-box{background:#fff;border-bottom:1px solid var(--border);padding:14px;}
.notice-write-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.86rem;outline:none;margin-bottom:8px;}
.notice-write-input:focus{border-color:#aaa;}
.notice-write-ta{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.86rem;outline:none;resize:vertical;min-height:80px;margin-bottom:8px;}
.notice-write-ta:focus{border-color:#aaa;}
.admin-hint-box{margin:14px;background:#fff8e1;border:1.5px dashed var(--gold);border-radius:10px;padding:14px;text-align:center;font-size:.8rem;color:#7a6000;}

/* ── 달력 ── */
.cal-wrap{background:#fff;margin:0;border-bottom:1px solid var(--border);}
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.cal-head h3{font-size:.95rem;font-weight:700;}
.cal-nav-btns{display:flex;align-items:center;gap:14px;}
.cal-nav-btns button{background:none;border:1px solid var(--border);color:var(--black);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;}
.cal-lbl{font-size:.88rem;font-weight:600;color:var(--black);min-width:80px;text-align:center;}
.cal-body{padding:10px 12px;}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-wd{text-align:center;font-size:.66rem;font-weight:600;color:var(--gray);padding:4px 0;}
.cal-wd:first-child{color:var(--red);}.cal-wd:last-child{color:#5585ff;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{min-height:48px;border-radius:8px;padding:3px 4px;cursor:pointer;transition:all .15s;}
.cal-day:hover:not(.empty){background:#f5f5f5;}.cal-day.empty{cursor:default;}
.cal-day.today .dn{background:var(--red);color:#fff !important;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-day.has-ev{background:#EFF6FF;}.cal-day.has-ev:hover{background:#DBEAFE;}
.dn{font-size:.74rem;font-weight:600;color:var(--black);width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-day-sun .dn{color:var(--red);}.cal-day-sat .dn{color:#5585ff;}
.cevs{margin-top:2px;display:flex;flex-direction:column;gap:1px;}
.cev{font-size:.52rem;background:var(--red);color:#fff;border-radius:3px;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
.upcoming-sec{padding:14px;}
.upcoming-sec h4{font-size:.85rem;font-weight:700;margin-bottom:10px;}
.ucard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;display:flex;gap:12px;align-items:center;transition:background .15s;}
.ucard:hover{background:#fafafa;}
.udate{text-align:center;min-width:36px;}
.udate-mon{font-size:.6rem;color:var(--red);font-weight:700;text-transform:uppercase;}
.udate-day{font-size:1.3rem;font-weight:900;line-height:1;color:var(--black);}
.utxt h5{font-size:.84rem;font-weight:600;}
.utxt p{font-size:.7rem;color:var(--gray);margin-top:2px;}

/* ── 계정 만들기 모달 ── */
.create-acct-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;padding:16px;}
.create-acct-modal.show{display:flex;}
.create-acct-box{background:#fff;border-radius:16px;width:100%;max-width:380px;overflow:hidden;}
.ca-head{background:var(--black);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.ca-head h3{font-size:.95rem;font-weight:700;}
.ca-close{background:none;border:none;color:#aaa;font-size:1.1rem;cursor:pointer;}
.ca-body{padding:20px;}
.ca-label{font-size:.74rem;font-weight:600;color:var(--gray);margin-bottom:4px;display:block;}
.ca-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.86rem;outline:none;margin-bottom:12px;transition:border .2s;}
.ca-input:focus{border-color:var(--blue);}
.ca-foot{display:flex;gap:8px;padding:0 20px 20px;}
.btn-ca-save{flex:1;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px;font-size:.88rem;font-weight:600;cursor:pointer;}
.btn-ca-cancel{background:#f0f0f0;color:#555;border:none;border-radius:8px;padding:11px 16px;font-size:.88rem;cursor:pointer;}

/* ── 알림 드롭다운 ── */
.notif-drop{position:absolute;top:52px;right:10px;width:290px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:200;display:none;overflow:hidden;}
.notif-drop.show{display:block;}
.notif-drop-head{padding:12px 14px;font-size:.82rem;font-weight:700;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.notif-drop-close{background:none;border:none;font-size:.9rem;cursor:pointer;color:var(--gray);}
.notif-scroll{max-height:240px;overflow-y:auto;}
.notif-row{padding:11px 14px;border-bottom:1px solid #fafafa;cursor:pointer;transition:background .15s;}
.notif-row:hover{background:#fafafa;}
.notif-row.new{background:#fff8f0;}
.notif-row-title{font-size:.8rem;font-weight:600;}
.notif-row-sub{font-size:.7rem;color:var(--gray);margin-top:2px;}
.notif-empty{padding:20px;text-align:center;font-size:.8rem;color:var(--gray);}

/* ── 데이 모달 ── */
.day-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;}
.day-modal.show{display:flex;}
.day-modal-box{background:#fff;border-radius:14px;width:90%;max-width:380px;overflow:hidden;}
.day-modal-head{background:var(--black);color:#fff;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;}
.day-modal-head h3{font-size:.9rem;font-weight:700;}
.day-modal-close{background:none;border:none;color:#aaa;font-size:1rem;cursor:pointer;}
.day-modal-body{padding:16px;max-height:50vh;overflow-y:auto;}
.day-ev-item{padding:9px 12px;border-radius:8px;background:#f5f5f5;margin-bottom:7px;cursor:pointer;transition:background .15s;}
.day-ev-item:hover{background:#eee;}

/* ── 삭제 모달 ── */
.del-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;}
.del-modal.show{display:flex;}
.del-modal-box{background:#fff;border-radius:14px;padding:24px;width:90%;max-width:320px;text-align:center;}
.del-modal-box h3{font-size:.95rem;margin-bottom:8px;}
.del-modal-box p{font-size:.78rem;color:var(--gray);margin-bottom:14px;}
.del-modal-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.86rem;outline:none;margin-bottom:12px;}
.del-modal-input:focus{border-color:var(--red);}
.del-btns{display:flex;gap:8px;}
.del-btns button{flex:1;padding:10px;border-radius:8px;font-size:.86rem;font-weight:600;cursor:pointer;border:none;}
.del-confirm{background:var(--red);color:#fff;}
.del-cancel{background:#f0f0f0;color:#555;}

/* ── 토스트 ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(0,0,0,.85);color:#fff;padding:10px 20px;border-radius:24px;font-size:.8rem;font-weight:500;transition:transform .3s,opacity .3s;z-index:800;opacity:0;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── 로딩 스피너 ── */
.mini-spin{position:fixed;inset:0;background:rgba(255,255,255,.6);z-index:600;display:none;align-items:center;justify-content:center;}
.mini-spin.show{display:flex;}

/* ── 게스트 배너 ── */
.guest-banner{background:#1a1a1a;color:#fff;text-align:center;padding:8px;font-size:.75rem;}
.guest-banner button{background:var(--blue);color:#fff;border:none;border-radius:5px;padding:3px 10px;font-size:.72rem;cursor:pointer;margin-left:8px;}

/* ── 빈 상태 ── */
.empty-state{text-align:center;padding:50px 20px;color:var(--gray);}
.empty-state .big-icon{font-size:2.8rem;margin-bottom:10px;}

/* 반응형 */

@media(max-width:400px){.write-row2,.write-row3{grid-template-columns:1fr;}}

// ═══ 유틸 ═══
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(ts){
  const d=new Date(ts),n=new Date(),df=n-d;
  if(df<60000) return '방금 전';
  if(df<3600000) return Math.floor(df/60000)+'분 전';
  if(df<86400000) return Math.floor(df/3600000)+'시간 전';
  if(df<604800000) return Math.floor(df/86400000)+'일 전';
  return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');
}
function avColor(name){let h=0;for(const c of (name||'?'))h=(h*31+c.charCodeAt(0))%AV_COLORS.length;return AV_COLORS[h];}
function avLetter(name){return (name||'?')[0].toUpperCase();}

// ═══ 비밀번호 해시 ═══
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ═══ 이미지 압축 ═══
async function compressImg(file,maxW=1080,q=0.72){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let {width:w,height:h}=img;
        if(w>maxW){h=h*maxW/w;w=maxW;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        res(canvas.toDataURL('image/jpeg',q));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

    if(!exists){
      const h=await hashPw(ADMIN_PW);
      await DS('users/admin',{displayName:'관리자',pwHash:h,isAdmin:true,createdAt:Date.now(),bio:'시범단 관리자'});
    }
  }catch(e){}

  const session=loadSession();
  if(session){
    CU=session;
    isGuest=!!session.guest;
    await startApp();
  } else {
    document.getElementById('full-loader').style.display='none';
    document.getElementById('page-login').classList.add('show');
  }
}

async function startApp(){
  document.getElementById('full-loader').style.display='none';
  document.getElementById('page-login').classList.remove('show');
  document.getElementById('page-app').style.display='block';
  if(isGuest) document.getElementById('guest-banner').style.display='block';
  document.getElementById('btn-notice-write').style.display=(!isGuest&&CU?.isAdmin)?'':'none';
  startRealtimeListener();
  goTab('feed');
  requestNotifPerm();
  // Ctrl+O for admin account creation
  document.addEventListener('keydown',e=>{
    if(e.ctrlKey&&e.key.toLowerCase()==='o'&&CU?.isAdmin){
      e.preventDefault();
      openCreateAcct();
    }
  });
}

// ═══ 로그인 ═══
async function doLogin(){
  const u=document.getElementById('li-user').value.trim();
  const p=document.getElementById('li-pw').value;
  document.getElementById('login-err').textContent='';
  if(!u||!p){document.getElementById('login-err').textContent='아이디와 비밀번호를 입력해주세요';return;}
  document.getElementById('btn-do-login').disabled=true;
  try{
    const h=await hashPw(p);
    const userData=await DG('users/'+u);
    if(!userData||userData.pwHash!==h)throw new Error('아이디 또는 비밀번호가 틀렸어요');
    CU={username:u,displayName:userData.displayName,isAdmin:!!userData.isAdmin,bio:userData.bio||''};
    isGuest=false;
    saveSession(CU);
    await startApp();
  }catch(e){
    document.getElementById('login-err').textContent=e.message;
    document.getElementById('btn-do-login').disabled=false;
  }
}
function doGuest(){
  CU={username:'guest',displayName:'게스트',isAdmin:false};
  isGuest=true;
  saveSession({...CU,guest:true});
  startApp();
}
function doLogout(){
  clearSession();CU=null;isGuest=false;
  document.getElementById('page-app').style.display='none';
  document.getElementById('guest-banner').style.display='none';
  document.getElementById('li-user').value='';
  document.getElementById('li-pw').value='';
  document.getElementById('page-login').classList.add('show');
  allPosts=[];
}
window.doLogout=doLogout;

// ═══ 실시간 리스너 ═══
let firstLoad=true;
function startRealtimeListener(){
  DON('posts',val=>{
    const prevKeys=allPosts.map(p=>p._key);
    allPosts=val?Object.entries(val).map(([k,v])=>({...v,_key:k})).sort((a,b)=>{
      if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;
      return b.ts-a.ts;
    }):[];
    if(!firstLoad){
      allPosts.forEach(p=>{
        if(!prevKeys.includes(p._key)&&p.ts>lastVisitTs){
          notifItems.unshift({key:p._key,title:p.caption?.slice(0,30)||p._key,author:p.authorDisplay,ts:p.ts});
          sendBrowserNotif(p.authorDisplay,p.caption?.slice(0,50)||'새 게시물을 올렸어요');
          document.getElementById('notif-dot').classList.add('show');
        }
      });
    }
    firstLoad=false;
    if(curTab==='feed') renderFeed();
    if(curTab==='search') renderSearchGrid();
    renderCalendar();renderUpcoming();
    renderStories();
  });
}

// ═══ 탭 이동 ═══
const TABS=['feed','search','write','notices','profile','calendar'];
function goTab(tab){
  if(tab==='write'&&isGuest){toast('로그인 후 이용할 수 있어요',false);return;}
  curTab=tab;
  TABS.forEach(t=>{
    const el=document.getElementById('view-'+t);
    if(el) el.style.display=t===tab?'':'none';
  });
  document.getElementById('view-detail').style.display='none';
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  const activeBtn=document.getElementById('bnav-'+tab);
  if(activeBtn) activeBtn.classList.add('active');
  if(tab==='feed'){renderFeed();renderStories();}
  if(tab==='search'){renderSearchGrid();}
  if(tab==='notices'){renderNotices();}
  if(tab==='profile'){renderProfile(CU?.username);}
  if(tab==='calendar'){renderCalendar();renderUpcoming();}
  window.scrollTo(0,0);
}
window.goTab=goTab;

// ═══ 피드 ═══
function renderStories(){
  const users={};
  allPosts.slice(0,20).forEach(p=>{if(!users[p.author])users[p.author]={name:p.authorDisplay,key:p._key};});
  const c=document.getElementById('story-bar');
  c.innerHTML=Object.entries(users).map(([u,d])=>`
    <div class="story-item" onclick="viewUserProfile('${u}')">
      <div class="story-ring"><div class="story-avatar" style="background:${avColor(d.name)};">${avLetter(d.name)}</div></div>
      <span class="story-name">${esc(d.name)}</span>
    </div>`).join('');
}

function renderFeed(posts=null){
  const list=posts||allPosts;
  const c=document.getElementById('feed-list');
  if(!list.length){c.innerHTML=`<div class="empty-state"><div class="big-icon">🥋</div><p>아직 게시물이 없어요</p></div>`;return;}
  c.innerHTML=list.map(p=>buildPostCard(p)).join('');
}

function buildPostCard(p){
  const liked=localReacts[`${p._key}_❤️`];
  const likeCount=(p.reactions&&p.reactions['❤️'])||0;
  const catColors={일반:'#555',훈련:'#1a7a3c',일정:'#1565C0',공지:'#D4AF37'};
  const attGo=p.attendance?Object.values(p.attendance).filter(a=>a.status==='go').length:0;
  const attNo=p.attendance?Object.values(p.attendance).filter(a=>a.status==='no').length:0;

  const emojiRow=EMOJIS.map(e=>{
    const cnt=(p.reactions&&p.reactions[e])||0;
    const active=localReacts[`${p._key}_${e}`];
    return `<button class="re-btn${active?' active':''}" onclick="toggleReact(event,'${p._key}','${e}')">${e}${cnt?` <span class="re-cnt">${cnt}</span>`:''}`;
  }).join('');

  return `<div class="post-card" id="card-${p._key}">
    <div class="pc-header">
      ${av(p.authorDisplay)}
      <div class="pc-user-info" onclick="viewUserProfile('${p.author}')">
        <div class="pc-username">${esc(p.authorDisplay)}</div>
        <div class="pc-tag" style="color:${catColors[p.category]||'#555'}">● ${esc(p.category)}${p.pinned?' 📌':''}</div>
      </div>
      <button class="pc-more" onclick="showPostMenu('${p._key}')">⋯</button>
    </div>
    ${p.imageData?`<img class="pc-image" src="${p.imageData}" alt="post" onclick="openDetail('${p._key}')" loading="lazy">`
    :`<div class="pc-text-only" onclick="openDetail('${p._key}')">${esc((p.caption||'').slice(0,120))}${(p.caption||'').length>120?'…':''}</div>`}
    <div class="pc-actions">
      <button class="btn-heart" onclick="toggleLike('${p._key}')" title="좋아요">${liked?'❤️':'🤍'}</button>
      <button class="btn-cmt-icon" onclick="openDetail('${p._key}')">💬</button>
      ${p.scheduleDate?`<span style="margin-left:auto;font-size:.72rem;color:#1565C0;">📅 ${p.scheduleDate}</span>`:''}
    </div>
    <div class="pc-emoji-row">${emojiRow}</div>
    ${likeCount?`<div class="pc-likes">좋아요 ${likeCount}개</div>`:''}
    ${p.caption?`<div class="pc-caption"><strong onclick="viewUserProfile('${p.author}')">${esc(p.authorDisplay)}</strong> ${esc(p.caption)}</div>`:''}
    ${p.commentCount?`<div class="pc-cmt-link" onclick="openDetail('${p._key}')">댓글 ${p.commentCount}개 모두 보기</div>`:''}
    ${p.attendanceOn?`<div class="pc-attendance" onclick="openDetail('${p._key}')">📋 출석 — ✅${attGo} ❌${attNo}</div>`:''}
    <div class="pc-date">${fmtDate(p.ts)}</div>
  </div>`;
}

// ═══ 좋아요 ═══
async function toggleLike(key){
  if(isGuest){toast('로그인 후 이용할 수 있어요',false);return;}
  const emoKey=`${key}_❤️`;
  const had=!!localReacts[emoKey];
  const cur=(await DG(`posts/${key}/reactions/❤️`))||0;
  await DS(`posts/${key}/reactions/❤️`,Math.max(0,had?cur-1:cur+1));
  if(had)delete localReacts[emoKey];else localReacts[emoKey]=true;
  localStorage.setItem(RK,JSON.stringify(localReacts));
}

// ═══ 이모지 ═══
async function toggleReact(e,key,emoji){
  e.preventDefault();e.stopPropagation();
  if(isGuest){toast('로그인 후 이용할 수 있어요',false);return;}
  const emoKey=`${key}_${emoji}`;

  const cur=(await DG(`posts/${key}/reactions/${emoji}`))||0;

}

async function openDetail(key){
  const prev=curTab;
  historyStack.push(prev);
  showLoad();
  try{
    const p=await DG('posts/'+key);
    if(!p){hideLoad();toast('게시물을 찾을 수 없어요',false);return;}
    p._key=key;
    const cmtVal=await DG('comments/'+key);
    p.comments=cmtVal?Object.entries(cmtVal).map(([k,v])=>({...v,_key:k})).sort((a,b)=>a.ts-b.ts):[];
    hideLoad();
    TABS.forEach(t=>{const el=document.getElementById('view-'+t);if(el)el.style.display='none';});
    const dv=document.getElementById('view-detail');
    dv.style.display='';
    dv.innerHTML=buildDetail(p);
    window.scrollTo(0,0);
  }catch(e){hideLoad();toast('❌ '+e.message,false);}
}

      ${p.caption?`<div class="pc-caption" style="padding:8px 16px 4px;"><strong onclick="viewUserProfile('${p.author}')">${esc(p.authorDisplay)}</strong> ${esc(p.caption)}</div>`:''}

// ═══ 포스트 메뉴 ═══
function showPostMenu(key){
  const p=allPosts.find(x=>x._key===key);
  const isMine=CU&&(CU.username===(p?.author)||CU.isAdmin);
  if(!isMine){toast('권한이 없어요',false);return;}
  const actions=[];
  if(CU.isAdmin) actions.push({label:p?.pinned?'📌 고정 해제':'📌 상단 고정',fn:()=>togglePin(key,!p?.pinned)});
  if(CU.isAdmin) actions.push({label:p?.attendanceOn?'📋 출석 OFF':'📋 출석 ON',fn:()=>toggleAtt(key,!p?.attendanceOn)});
  actions.push({label:'🗑️ 삭제',fn:()=>askDel(key,'post')});
  // Simple action sheet via confirm chain
  const labels=actions.map((a,i)=>`${i+1}. ${a.label}`).join('\n');
  const choice=prompt(`작업을 선택하세요:\n${labels}\n\n번호를 입력하세요 (취소: 빈칸)`);
  if(!choice) return;
  const idx=parseInt(choice)-1;
  if(actions[idx]) actions[idx].fn();
}
window.showPostMenu=showPostMenu;

async function submitComment(postKey){

async function delComment(postKey,cmtKey,storedPw){
  if(!CU?.isAdmin){
    const entered=prompt('댓글 삭제하려면 비밀번호를 입력하세요:');
    if(!entered) return;
    if(storedPw&&storedPw!=='admin_bypass'&&entered!==storedPw){toast('❌ 비밀번호가 틀렸어요',false);return;}
  }
  showLoad();
  try{
    await DD('comments/'+postKey+'/'+cmtKey);
    const cur=(await DG('posts/'+postKey+'/commentCount'))||1;
    await DS('posts/'+postKey+'/commentCount',Math.max(0,cur-1));
    hideLoad();toast('🗑️ 삭제됐어요!');
    await openDetail(postKey);
  }catch(e){hideLoad();toast('❌ '+e.message,false);}
}
window.delComment=delComment;

// ═══ 삭제 (글) ═══
let delKey=null,delType=null;
function askDel(key,type){
  delKey=key;delType=type;
  document.getElementById('del-desc').textContent='삭제하려면 비밀번호를 입력하세요.';
  document.getElementById('del-pw').value='';
  document.getElementById('m-del').classList.add('show');
  setTimeout(()=>document.getElementById('del-pw').focus(),100);
}
async function confirmDel(){
  const entered=document.getElementById('del-pw').value;
  closeM('m-del');
  showLoad();
  try{
    if(delType==='post'){
      if(!CU?.isAdmin){
        const p=await DG('posts/'+delKey);
        if(!p||p.pw!==entered){hideLoad();toast('❌ 비밀번호가 틀렸어요',false);return;}
      }
      await Promise.all([DD('posts/'+delKey),DD('comments/'+delKey)]);
      hideLoad();toast('🗑️ 삭제됐어요!');
      backFromDetail();
    }
  }catch(e){hideLoad();toast('❌ '+e.message,false);}
}

// ═══ 검색 ═══
function renderSearchGrid(q='',tag=''){
  let list=allPosts;
  if(q) list=list.filter(p=>p.authorDisplay?.includes(q)||p.caption?.includes(q));
  if(tag) list=list.filter(p=>p.category===tag);
  const c=document.getElementById('search-grid');
  if(!list.length){c.innerHTML=`<div class="empty-state" style="grid-column:1/-1;"><div class="big-icon">🔍</div><p>검색 결과가 없어요</p></div>`;return;}
  c.innerHTML=list.map(p=>`
    <div class="search-thumb" onclick="openDetail('${p._key}')">
      ${p.imageData?`<img src="${p.imageData}" alt="thumb" loading="lazy">`:`<div class="no-img">${p.category==='일정'?'📅':p.category==='훈련'?'🥊':p.category==='공지'?'📢':'💬'}</div>`}
    </div>`).join('');
}
function doSearch(q){searchFilter=q;renderSearchGrid(q,searchTag);}
function filterTag(el,tag){
  searchTag=tag;
  document.querySelectorAll('.s-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderSearchGrid(searchFilter,tag);
}
window.doSearch=doSearch;window.filterTag=filterTag;

// ═══ 프로필 ═══
async function renderProfile(username){
  if(!username){return;}
  const c=document.getElementById('view-profile');
  c.innerHTML=`<div class="empty-state"><div class="big-icon">⏳</div><p>불러오는 중...</p></div>`;
  try{
    const userData=await DG('users/'+username)||{displayName:username,bio:''};
    const myPosts=allPosts.filter(p=>p.author===username);
    const isSelf=CU?.username===username;

    c.innerHTML=`
      <div class="profile-top">
        <div class="profile-info">
          <div class="profile-big-av" style="background:${avColor(userData.displayName)};">${avLetter(userData.displayName)}</div>
          <div class="profile-details">
            <div class="profile-username">@${esc(username)}</div>
            <div class="profile-display">${esc(userData.displayName||username)}</div>
            ${userData.bio?`<div class="profile-bio">${esc(userData.bio)}</div>`:''}
          </div>
        </div>
        <div class="profile-stats">
          <div class="pstat"><div class="pstat-num">${myPosts.length}</div><div class="pstat-lbl">게시물</div></div>
          <div class="pstat"><div class="pstat-num">${myPosts.reduce((s,p)=>s+((p.reactions&&p.reactions['❤️'])||0),0)}</div><div class="pstat-lbl">좋아요</div></div>
          <div class="pstat"><div class="pstat-num">${myPosts.reduce((s,p)=>s+(p.commentCount||0),0)}</div><div class="pstat-lbl">댓글</div></div>
        </div>
        ${isSelf?`<div class="profile-actions">
          <button class="btn-edit-profile" onclick="openEditProfile()">프로필 수정</button>
          <button class="btn-logout" onclick="doLogout()">로그아웃</button>
        </div>`:''}
      </div>
      <div class="profile-grid">
        ${myPosts.length?myPosts.map(p=>`
          <div class="profile-thumb" onclick="openDetail('${p._key}')">
            ${p.imageData?`<img src="${p.imageData}" alt="" loading="lazy">`:`<div class="no-img">${p.category==='일정'?'📅':p.category==='훈련'?'🥊':p.category==='공지'?'📢':'💬'}</div>`}
          </div>`).join(''):`<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray);">아직 게시물이 없어요</div>`}
      </div>`;
  }catch(e){c.innerHTML=`<div class="empty-state"><div class="big-icon">⚠️</div><p>불러오기 실패</p></div>`;}
}
async function viewUserProfile(username){
  historyStack.push(curTab);
  TABS.forEach(t=>{const el=document.getElementById('view-'+t);if(el)el.style.display='none';});
  document.getElementById('view-detail').style.display='none';

window.viewUserProfile=viewUserProfile;
function openEditProfile(){

  document.getElementById('pem-bio').value=CU?.bio||'';
  document.getElementById('m-edit-profile').classList.add('show');

// ═══ 공지 ═══
async function renderNotices(){
  document.getElementById('btn-notice-write').style.display=(!isGuest&&CU?.isAdmin)?'':'none';
  const c=document.getElementById('notice-list');
  c.innerHTML=`<div class="empty-state"><div class="big-icon">⏳</div></div>`;
  try{
    const val=await DG('notices');
    const ns=val?Object.entries(val).map(([k,v])=>({...v,_key:k})).sort((a,b)=>b.ts-a.ts):[];
    if(!ns.length){
      c.innerHTML=(!isGuest&&CU?.isAdmin)?'':`<div class="admin-hint-box">👑 공지는 관리자만 작성할 수 있어요</div>`;
      c.innerHTML+=`<div class="empty-state"><div class="big-icon">📢</div><p>등록된 공지가 없어요</p></div>`;
      return;
    }
    c.innerHTML=(CU?.isAdmin?'':'<div class="admin-hint-box">👑 공지는 관리자만 작성할 수 있어요</div>')+ns.map(n=>`
      <div class="notice-item">
        <div class="ni-head">
          <div class="ni-title">📢 ${esc(n.title)}</div>
          <div style="display:flex;align-items:center;gap:6px;">
            <div class="ni-date">${fmtDate(n.ts)}</div>
            ${CU?.isAdmin?`<button class="ni-del" onclick="delNotice('${n._key}')">삭제</button>`:''}
          </div>
        </div>
        <div class="ni-body">${esc(n.content)}</div>
      </div>`).join('');
  }catch(e){c.innerHTML=`<div class="empty-state"><div class="big-icon">⚠️</div></div>`;}
}
function showNoticeWrite(){document.getElementById('notice-write-area').style.display='';document.getElementById('nw-title').value='';document.getElementById('nw-body').value='';}
function hideNoticeWrite(){document.getElementById('notice-write-area').style.display='none';}
async function submitNotice(){
  const title=document.getElementById('nw-title').value.trim();
  const content=document.getElementById('nw-body').value.trim();
  if(!title||!content){toast('제목과 내용을 모두 입력해주세요',false);return;}

async function delNotice(key){if(!confirm('공지를 삭제할까요?'))return;showLoad();try{await DD('notices/'+key);hideLoad();toast('🗑️ 삭제됐어요!');renderNotices();}catch(e){hideLoad();toast('❌ '+e.message,false);}}
window.showNoticeWrite=showNoticeWrite;window.hideNoticeWrite=hideNoticeWrite;window.submitNotice=submitNotice;window.delNotice=delNotice;

// ═══ 달력 ═══
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const MONS_EN=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function getSchPosts(){return allPosts.filter(p=>p.category==='일정'&&p.scheduleDate);}
function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCalendar();renderUpcoming();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCalendar();renderUpcoming();}
window.calPrev=calPrev;window.calNext=calNext;
function renderCalendar(){
  const lbl=document.getElementById('cal-lbl');
  if(lbl) lbl.textContent=calY+'년 '+MONTHS[calM];
  const grid=document.getElementById('cal-grid');
  if(!grid) return;
  const today=new Date();
  const fd=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const byDate={};
  getSchPosts().forEach(p=>{if(!byDate[p.scheduleDate])byDate[p.scheduleDate]=[];byDate[p.scheduleDate].push(p);});
  let html='';
  for(let i=0;i<fd;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=today.getFullYear()===calY&&today.getMonth()===calM&&today.getDate()===d;
    const evs=byDate[ds]||[];
    const dow=new Date(calY,calM,d).getDay();
    const dc=dow===0?'cal-day-sun':dow===6?'cal-day-sat':'';
    const evH=evs.slice(0,2).map(e=>`<div class="cev">${esc(e.authorDisplay?.slice(0,4)||'')}</div>`).join('')+(evs.length>2?`<div class="cev" style="background:var(--tag-blue);">+${evs.length-2}</div>`:'');
    html+=`<div class="cal-day ${dc}${isToday?' today':''}${evs.length?' has-ev':''}" onclick="openDayModal('${ds}')"><div class="dn">${d}</div><div class="cevs">${evH}</div></div>`;
  }
  grid.innerHTML=html;
}
function renderUpcoming(){
  const today=new Date();today.setHours(0,0,0,0);
  const posts=getSchPosts().filter(p=>new Date(p.scheduleDate)>=today).sort((a,b)=>new Date(a.scheduleDate)-new Date(b.scheduleDate)).slice(0,5);
  const c=document.getElementById('upcoming-list');
  if(!c) return;
  if(!posts.length){c.innerHTML=`<div style="text-align:center;padding:20px;color:var(--gray);font-size:.8rem;">다가오는 일정이 없어요</div>`;return;}
  c.innerHTML=posts.map(p=>{
    const d=new Date(p.scheduleDate);
    return `<div class="ucard" onclick="openDetail('${p._key}')">
      <div class="udate"><div class="udate-mon">${MONS_EN[d.getMonth()]}</div><div class="udate-day">${d.getDate()}</div></div>
      <div class="utxt"><h5>${esc(p.caption?.slice(0,30)||'일정')}</h5><p>👤 ${esc(p.authorDisplay)}${p.timeStart?' · ⏰ '+p.timeStart+(p.timeEnd?' ~ '+p.timeEnd:''):''}</p></div>
    </div>`;
  }).join('');
}
function openDayModal(ds){
  const evs=getSchPosts().filter(p=>p.scheduleDate===ds);
  const [y,m,d]=ds.split('-');
  document.getElementById('day-title').textContent=`📅 ${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
  document.getElementById('day-body').innerHTML=evs.length?evs.map(p=>`
    <div class="day-ev-item" onclick="closeM('m-day');openDetail('${p._key}')">
      <div style="font-size:.84rem;font-weight:600;">${esc(p.caption?.slice(0,30)||'일정')}</div>
      <div style="font-size:.7rem;color:var(--gray);">👤 ${esc(p.authorDisplay)}</div>
    </div>`).join(''):`<p style="color:var(--gray);font-size:.8rem;padding:8px 0;">이 날은 일정이 없어요.</p>`;
  document.getElementById('m-day').classList.add('show');
}
window.openDayModal=openDayModal;

// ═══ 계정 만들기 (Ctrl+O) ═══
function openCreateAcct(){
  ['ca-username','ca-display','ca-pw'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ca-role').value='member';
  document.getElementById('m-create-acct').classList.add('show');
}
async function createAccount(){
  const u=document.getElementById('ca-username').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const d=document.getElementById('ca-display').value.trim();
  const p=document.getElementById('ca-pw').value;
  const isAdm=document.getElementById('ca-role').value==='admin';
  if(!u||!d||!p){toast('모든 항목을 입력해주세요',false);return;}
  if(u.length<3){toast('아이디는 3자 이상이어야 해요',false);return;}
  showLoad();
  try{
    const exists=await DG('users/'+u);
    if(exists){hideLoad();toast('이미 존재하는 아이디예요',false);return;}
    const h=await hashPw(p);
    await DS('users/'+u,{displayName:d,pwHash:h,isAdmin:isAdm,createdAt:Date.now(),bio:'',createdBy:CU.username});
    hideLoad();closeM('m-create-acct');
    toast(`✅ @${u} 계정이 만들어졌어요!`);
  }catch(e){hideLoad();toast('❌ '+e.message,false);}
}
window.createAccount=createAccount;
window.openCreateAcct=openCreateAcct;

async function requestNotifPerm(){if('Notification' in window&&Notification.permission==='default') await Notification.requestPermission();}
function sendBrowserNotif(name,body){
  if(Notification.permission==='granted'&&document.visibilityState!=='visible')
    new Notification('🥋 시범단 - '+name,{body,icon:'https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f94b.png'});

let notifOpen=false;
function toggleNotif(){
  notifOpen=!notifOpen;
  const drop=document.getElementById('notif-drop');
  drop.classList.toggle('show',notifOpen);
  if(notifOpen){
    document.getElementById('notif-dot').classList.remove('show');
    lastVisitTs=Date.now();
    localStorage.setItem('sbd_lv',lastVisitTs.toString());
    renderNotifDrop();
  }
}
function renderNotifDrop(){
  const c=document.getElementById('notif-scroll');
  if(!notifItems.length){c.innerHTML='<div class="notif-empty">아직 알림이 없어요</div>';return;}
  c.innerHTML=notifItems.slice(0,15).map(n=>`
    <div class="notif-row new" onclick="toggleNotif();openDetail('${n.key}')">
      <div class="notif-row-title">${esc(n.author)} 님이 새 게시물을 올렸어요</div>
      <div class="notif-row-sub">${esc(n.title||'게시물')} · ${fmtDate(n.ts)}</div>
    </div>`).join('');
}
window.toggleNotif=toggleNotif;
document.addEventListener('click',e=>{if(notifOpen&&!e.target.closest('.notif-drop')&&!e.target.closest('.header-icon')){notifOpen=false;document.getElementById('notif-drop').classList.remove('show');}});

window.closeM=closeM;
['m-del','m-day','m-create-acct','m-edit-profile'].forEach(id=>{
